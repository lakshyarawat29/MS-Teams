spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/teamsclone}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:teams-clone-super-secret-jwt-key-must-be-at-least-256-bits-long-for-hs256}
    expiration: ${JWT_EXPIRATION:900000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.teamsclone: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO
