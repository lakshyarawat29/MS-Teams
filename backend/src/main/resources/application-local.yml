spring:
  datasource:
    url: jdbc:h2:mem:teamsclone;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false

  flyway:
    enabled: false

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 26MB

app:
  jwt:
    secret: localdevonlysecretkey1234567890abcdefghijklmnop
    expiration: 900000
    refresh-expiration: 604800000
  upload-dir: uploads

logging:
  level:
    com.teamsclone: DEBUG
