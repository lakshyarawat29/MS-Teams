version: '3.9'

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: teamsclone-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: teamsclone
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d teamsclone"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── Backend (Spring Boot) ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: teamsclone-backend
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/teamsclone
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: teams-clone-production-jwt-secret-key-change-this-before-deploying-min-256-bits
      JWT_EXPIRATION: 900000
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ── Frontend (React + Nginx) ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: teamsclone-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
